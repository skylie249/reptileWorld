<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPage - Reptile World</title>
    <link rel="stylesheet" href="css/styles.css?v=1.1">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="leaf"></i>
                Reptile<span class="highlight">World</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#species" data-i18n="nav_species">파충류 도감</a></li>
                <li><a href="index.html#care-guide" data-i18n="nav_guide">사육 가이드</a></li>
                <li><a href="index.html#supplies" data-i18n="nav_supplies">용품 세팅</a></li>
                <li><a href="index.html#community" data-i18n="nav_community">커뮤니티</a></li>
                <li><a href="mypage.html" class="active" data-i18n="nav_mypage">마이페이지</a></li>
            </ul>
            <div class="nav-controls">
                <select class="lang-select" aria-label="Select Language">
                    <option value="ko">한국어</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <i data-lucide="sun"></i>
                </button>
                <button class="mobile-menu-btn" aria-label="Toggle menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <section class="guide-header">
            <h1 class="animate-on-scroll" data-i18n="p_hero_title">나만의 파충류 다이어리</h1>
            <p class="animate-on-scroll delay-1" data-i18n="p_hero_desc">사랑스러운 개체들의 일상을 기록하고 관리하세요.</p>
        </section>

        <section class="mypage-container animate-on-scroll delay-2">
            <!-- Upload Form -->
            <div class="glass-card upload-section">
                <h3><i data-lucide="edit-3"></i> <span data-i18n="p_write_title">새로운 기록 작성하기</span></h3>
                <div class="upload-form">
                    <textarea id="postText" data-i18n-placeholder="p_placeholder" placeholder="귀여운 파충류의 오늘 하루를 기록해주세요..." rows="4"></textarea>
                    <div class="upload-actions">
                        <div>
                            <label for="postImageBtn" class="upload-label">
                                <i data-lucide="image"></i> <span data-i18n="p_upload">직접 사진 선택</span>
                            </label>
                            <input type="file" id="postImageBtn" accept="image/*" style="display: none;">
                            <span id="fileName" style="margin-left: 0.5rem; color: var(--text-muted); font-size: 0.9rem;"></span>
                        </div>
                        <button id="submitPostBtn" class="btn btn-primary"><i data-lucide="send"></i> <span data-i18n="p_submit">다이어리 게시</span></button>
                    </div>
                </div>
            </div>

            <!-- Feed Section -->
            <div class="feed-section">
                <h3><i data-lucide="book-open"></i> <span data-i18n="p_feed_title">내 다이어리 피드 (My Diary)</span></h3>
                <div id="mypageFeed" class="card-grid mypage-feed-grid">
                    <!-- Posts via JS -->
                </div>
                <div id="noPostsMsg" class="empty-card" style="display: none;">
                    <br><i data-lucide="inbox" class="icon-large"></i>
                    <h3 data-i18n="p_empty">아직 기록이 없습니다.</h3>
                </div>
            </div>
        </section>
    </main>

    <footer class="animate-on-scroll">
        <div class="footer-content" style="max-width: 1200px; margin: 0 auto; text-align: center;">
            <div class="footer-logo" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="leaf"></i>
                <span>ReptileWorld</span>
            </div>
            <p style="color: var(--text-muted);" data-i18n="foot_desc">&copy; 2026 Reptile World. All rights reserved. By AI Assistant.</p>
        </div>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/main.js?v=1.1"></script>
    <script src="js/mypage.js?v=1.1"></script>
    <script>
        lucide.createIcons();
    </script>
    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
        <i data-lucide="arrow-up"></i>
    </button>
</body>
</html>
